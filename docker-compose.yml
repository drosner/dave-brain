services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # Auth
      - N8N_SECURE_COOKIE=false
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      # Network — critical for OAuth callback to work
      - N8N_EDITOR_BASE_URL=http://192.168.0.215:5678
      - WEBHOOK_URL=http://192.168.0.215:5678
      # Timezone
      - GENERIC_TIMEZONE=America/New_York
      - TZ=America/New_York
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      # Data path
      - N8N_USER_FOLDER=/home/node/.n8n
    volumes:
      - n8n_data:/home/node/.n8n
      # Mount scripts dir so n8n Execute Command nodes can call them
      - /home/drosner/dave-brain/scripts:/scripts:ro
      # Mount .auth dir for Gmail credentials (read-only)
      - /home/drosner/dave-brain/.auth:/home/node/.auth:ro
    env_file:
      - /home/drosner/dave-brain/.env
    networks:
      - brain
  playwright-runner:
    image: mcr.microsoft.com/playwright:v1.52.0-noble
    container_name: playwright-runner
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install --prefer-offline && npm run start"
    network_mode: host
    volumes:
      - /home/drosner/dave-brain/scripts/playwright:/app
      - /home/drosner/dave-brain/scripts/logs:/home/drosner/dave-brain/scripts/logs
      - playwright_runner_modules:/app/node_modules
    environment:
      # Connect to Pi's Chromium over CDP — do NOT use bundled browser
      - CHROMIUM_CDP_URL=http://127.0.0.1:9222
    env_file:
      - /home/drosner/dave-brain/.env
  wine-scanner:
    image: node:20-alpine
    container_name: wine-scanner
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install --prefer-offline && node server.js"
    ports:
      - "3333:3333"
    volumes:
      - /home/drosner/dave-brain/wine-scanner:/app
      - wine_scanner_modules:/app/node_modules # ← add this line
    env_file:
      - /home/drosner/dave-brain/.env
    networks:
      - brain

networks:
  brain:
    driver: bridge

volumes:
  n8n_data:
    driver: local
  playwright_runner_modules:
    driver: local
  wine_scanner_modules:
    # ← add this
    driver: local
